name: Weekly MTG Scraper

on:
  schedule:
    # Runs every hour at minute 10
    - cron: '10 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-mtg:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      
      - name: Scrape MTGGoldfish Legacy meta
        run: |
          python scripts/scrape_legacy.py --limit 5
      
      - name: Analyze hate cards
        run: |
          python scripts/analyze_hate_cards.py
      
      - name: Generate PDF report
        run: |
          python scripts/generate_pdf_report.py
      
      - name: Commit and push outputs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -B reports origin/reports 2>/dev/null || git checkout -b reports
          git add output/decks/ output/reports/ output/paper/
          git commit -m "chore: weekly MTG scrape ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes to commit"
          git push -u origin reports
